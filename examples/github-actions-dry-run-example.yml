name: Yankees THEEE Dry Run

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m tests.test_theee_title
      - run: python -m tests.test_mlb_yankees
      - run: python -m yankees_theee_bot --dry-run
